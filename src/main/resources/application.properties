# Configuracion de la aplicacion
spring.application.name=asignacion-turnos-enfermeria
#spring.profiles.active=dev

# Clave JWT para desarrollo local (HMAC256)
security.jwt.key.private=clave-secreta-desarrollo-husjp-2026

# ===== CONFIGURACION DE MULTIPLES BASES DE DATOS =====
# ===== BASE DE DATOS PRINCIPAL (ACTIVA) =====
spring.datasource.url=jdbc:postgresql://localhost:5432/turnos
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuracion de JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===== CONFIGURACION DE POOLS =====
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000

# Configuracion de Spring Security
spring.security.user.name=admin
spring.security.user.password=admin

