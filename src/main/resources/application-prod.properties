spring.application.name=${NAME_PROD_MONITORIZACION_HC}
spring.config.import=optional:file:./env.properties
server.port=${PORT_PROD_MONITORIZACION_HC}
spring.datasource.url=${POSTGRES_PROD_DB_MONITORIZACION_HC_URL}
spring.datasource.username=${POSTGRES_PROD_DB_USER}
spring.datasource.password=${POSTGRES_PROD_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Eureka config
#eureka.client.enabled=true
#eureka.client.service-url.defaultZone=${SERVER_PRODUCCION}:${PORT_PROD_EUREKA_SERVER}/eureka/

swagger.server.local=${SERVER_LOCAL}:${server.port}
swagger.server.prod=${SERVER_PRODUCCION}:${server.port}
swagger.server.api=${SERVER_PRODUCCION}:${PORT_PROD_API_GATEWAY}/${spring.application.name}
app.version=1.0.0

endpoint.antepuesto=
security.jwt.key.private=${SECRET_KEY_PRIVATE_PROD}